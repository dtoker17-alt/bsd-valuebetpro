<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BSD · Value Bet Detector</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Barlow+Condensed:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080808;
  --card: #111111;
  --card2: #181818;
  --border: #222222;
  --text: #f2f2f2;
  --muted: #555;
  --muted2: #888;
  --green: #00d67a;
  --red: #ff3b3b;
  --yellow: #ffd000;
  --blue: #2979ff;
  --cyan: #00e5ff;
  --orange: #ff7043;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;min-height:100vh;overscroll-behavior:none}
/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200}
.logo{display:flex;align-items:center;gap:9px}
.logo-icon{width:34px;height:34px;background:#2979ff;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px}
.logo-text{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:900;letter-spacing:1px}
.topbar-right{display:flex;align-items:center;gap:10px}
.live-badge{background:rgba(255,59,59,.12);color:var(--red);border:1px solid rgba(255,59,59,.25);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:5px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--red);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
.refresh-btn{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:7px 12px;color:var(--muted2);font-size:12px;font-weight:600;cursor:pointer;font-family:'Barlow',sans-serif}
.refresh-btn:active{opacity:.7}
/* FILTER TABS */
.filter-bar{display:flex;gap:0;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:57px;z-index:190}
.filter-bar::-webkit-scrollbar{display:none}
.ftab{padding:10px 16px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:.15s}
.ftab.on{color:var(--text);border-bottom-color:var(--cyan)}
/* MATCH LIST */
.matches-wrap{padding:10px 12px}
.section-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin:14px 0 8px}
/* MATCH CARD */
.match-card{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:8px;overflow:hidden;cursor:pointer;transition:.15s}
.match-card:active{transform:scale(.99);opacity:.9}
.match-card.has-value{border-color:rgba(0,214,122,.2)}
.match-card.live-card{border-color:rgba(255,59,59,.25)}
.mc-header{padding:11px 14px 0;display:flex;justify-content:space-between;align-items:center}
.mc-league{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.mc-status{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px}
.mc-status.live{background:rgba(255,59,59,.15);color:var(--red)}
.mc-status.upcoming{background:rgba(41,121,255,.12);color:var(--blue)}
.mc-status.finished{background:var(--card2);color:var(--muted)}
.mc-body{padding:10px 14px 12px}
.mc-teams{display:flex;align-items:center;justify-content:space-between}
.mc-team{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px}
.mc-team-name{font-size:13px;font-weight:700;text-align:center;line-height:1.2}
.mc-crest{width:36px;height:36px;border-radius:50%;background:var(--card2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px}
.mc-center{display:flex;flex-direction:column;align-items:center;gap:4px;padding:0 8px}
.mc-score{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;letter-spacing:1px}
.mc-time{font-size:11px;color:var(--muted2);font-weight:600}
.mc-footer{padding:0 14px 11px;display:flex;align-items:center;justify-content:space-between}
.mc-pick{display:flex;align-items:center;gap:6px}
.mc-pick-label{font-size:11px;font-weight:700;color:var(--muted2)}
.mc-pick-val{font-size:12px;font-weight:700;color:var(--green)}
.mc-pick-pct{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;color:var(--green)}
.mc-value-pills{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}
.vpill{font-size:10px;font-weight:700;padding:3px 7px;border-radius:6px}
.vpill.fire{background:rgba(255,59,59,.15);color:var(--red)}
.vpill.check{background:rgba(0,214,122,.12);color:var(--green)}
.vpill.warn{background:rgba(255,208,0,.1);color:var(--yellow)}
.mc-form{display:flex;gap:3px;margin-top:5px}
.fd{width:20px;height:20px;border-radius:5px;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center}
.fd.w{background:rgba(0,214,122,.2);color:var(--green)}
.fd.d{background:rgba(255,208,0,.15);color:var(--yellow)}
.fd.l{background:rgba(255,59,59,.15);color:var(--red)}
/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:16px}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--muted2)}
/* ERROR */
.error-state{text-align:center;padding:60px 20px}
.error-icon{font-size:40px;margin-bottom:12px}
.error-msg{font-size:14px;color:var(--muted2);margin-bottom:16px}
.retry-btn{background:var(--blue);color:#fff;border:none;border-radius:10px;padding:10px 24px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Barlow',sans-serif}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;display:none;overflow-y:auto}
.modal-overlay.open{display:block}
.modal{background:var(--bg);min-height:100vh;max-width:430px;margin:0 auto}
.modal-topbar{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:10}
.back-btn{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:7px 10px;cursor:pointer;font-size:16px}
.modal-title{font-size:14px;font-weight:700;flex:1}
/* HERO */
.match-hero{background:var(--card);margin:12px;border-radius:16px;padding:20px 16px 16px;border:1px solid var(--border)}
.hero-league{text-align:center;font-size:11px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}
.hero-league span{color:var(--blue)}
.hero-teams{display:flex;align-items:center;justify-content:space-between}
.hero-team{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px}
.hero-crest{width:56px;height:56px;border-radius:50%;background:var(--card2);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:26px}
.hero-name{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;text-align:center;line-height:1.2}
.hero-center{display:flex;flex-direction:column;align-items:center;gap:5px}
.hero-score{font-family:'Barlow Condensed',sans-serif;font-size:40px;font-weight:900;letter-spacing:1px}
.hero-time-pill{background:rgba(41,121,255,.15);color:var(--blue);font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px}
.hero-ws{display:flex;align-items:center;gap:6px;background:rgba(0,214,122,.1);border:1px solid rgba(0,214,122,.2);border-radius:20px;padding:5px 12px;font-size:10px;font-weight:600;color:var(--green);margin:10px auto 0;width:fit-content;text-transform:uppercase;letter-spacing:.3px}
.ws-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:blink 1.5s infinite}
.hero-venue{text-align:center;font-size:11px;color:var(--muted);margin-top:7px}
/* MODAL TABS */
.m-tabs{display:flex;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:57px;z-index:10}
.m-tabs::-webkit-scrollbar{display:none}
.m-tab{padding:10px 16px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:.15s}
.m-tab.on{color:var(--text);border-bottom-color:var(--cyan)}
/* PANELS */
.m-panel{display:none;padding:12px}
.m-panel.on{display:block}
/* CARDS */
.mc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.mc-t{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
/* PROB BAR */
.prob-bar-wrap{margin:12px 0 4px}
.prob-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--muted2);margin-bottom:5px}
.prob-bar{height:7px;border-radius:4px;display:flex;overflow:hidden;gap:2px}
.pb-h{background:var(--blue);border-radius:4px 0 0 4px}
.pb-d{background:var(--yellow)}
.pb-a{background:var(--red);border-radius:0 4px 4px 0}
.prob-nums{display:flex;justify-content:space-between;margin-top:8px}
.pn{flex:1;text-align:center}
.pn-val{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:800}
.pn-lbl{font-size:10px;color:var(--muted2)}
/* LAMBDA */
.lambda-row{display:flex;justify-content:space-around;margin:10px 0 14px}
.lb{text-align:center}
.lb-val{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:900;color:var(--cyan)}
.lb-lbl{font-size:10px;color:var(--muted2)}
/* VALUE BETS */
.vb-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.vb-row:last-child{border-bottom:none}
.vb-left{display:flex;align-items:center;gap:10px}
.vb-ico{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.vb-ico.fire{background:rgba(255,59,59,.15)}
.vb-ico.check{background:rgba(0,214,122,.12)}
.vb-ico.warn{background:rgba(255,208,0,.1)}
.vb-mkt{font-size:10px;color:var(--muted2)}
.vb-sel{font-size:14px;font-weight:700}
.vb-right{text-align:right}
.vb-odd{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;color:var(--cyan)}
.vb-val{font-size:11px;color:var(--green);font-weight:700}
.vb-kelly{font-size:10px;color:var(--muted2)}
/* STAT GRID */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.s-box{background:var(--card2);border-radius:10px;padding:12px;text-align:center}
.s-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px}
.s-val{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800}
.s-sub{font-size:10px;color:var(--muted2);margin-top:2px}
/* FORM TABLE */
.form-block{margin-bottom:14px}
.form-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.form-name{font-size:13px;font-weight:700}
.form-rec{font-size:11px;color:var(--muted2)}
.form-matches{margin-bottom:6px}
.form-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px}
.form-row:last-child{border-bottom:none}
.form-opp{color:var(--muted2)}
.score-pill{display:inline-block;padding:2px 8px;border-radius:5px;font-weight:700;font-size:11px}
.score-pill.w{background:rgba(0,214,122,.18);color:var(--green)}
.score-pill.d{background:rgba(255,208,0,.12);color:var(--yellow)}
.score-pill.l{background:rgba(255,59,59,.15);color:var(--red)}
/* H2H */
.h2h-big{display:grid;grid-template-columns:1fr 1fr 1fr;text-align:center;margin-bottom:12px}
.h2h-n{font-family:'Barlow Condensed',sans-serif;font-size:40px;font-weight:900}
.h2h-n.b{color:var(--blue)}
.h2h-n.o{color:var(--orange)}
.h2h-n.r{color:var(--red)}
.h2h-sub{font-size:11px;color:var(--muted2)}
.h2h-bar{height:5px;border-radius:3px;display:flex;overflow:hidden;gap:2px;margin-bottom:12px}
.h2h-bar .s1{background:var(--blue);border-radius:3px 0 0 3px}
.h2h-bar .s2{background:var(--orange)}
.h2h-bar .s3{background:var(--red);border-radius:0 3px 3px 0}
.h2h-table{width:100%;border-collapse:collapse}
.h2h-table th{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:0 0 8px;text-align:left;font-weight:700}
.h2h-table td{padding:7px 0;border-top:1px solid var(--border);font-size:12px}
.h2h-table td:nth-child(3){text-align:center}
.h2h-table td:last-child{text-align:right}
/* ODDS TABLE */
.odds-hdr{display:flex;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;padding:0 0 6px;border-bottom:1px solid var(--border);margin-bottom:4px}
.odds-row{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.odds-row:last-child{border-bottom:none}
.odds-row.consensus{background:rgba(41,121,255,.07);border-left:3px solid var(--blue);padding-left:9px;border-radius:6px;margin-bottom:4px}
.o-book{flex:1;font-size:13px;font-weight:600}
.o-book.bold{font-weight:800}
.o-v{width:56px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700}
.o-v.best{color:var(--green);font-weight:800}
/* INFO TABLE */
.info-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
.info-row:last-child{border-bottom:none}
.info-k{color:var(--muted2)}
.info-v{font-weight:600;text-align:right}
.info-v.link{color:var(--blue)}
/* PREDICTION HERO */
.pred-main{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.pred-lbl{font-size:12px;color:var(--muted2);margin-bottom:3px}
.pred-pick{font-size:16px;font-weight:800}
.pred-pct{font-family:'Barlow Condensed',sans-serif;font-size:48px;font-weight:900;color:var(--green);line-height:1}
.pred-pct span{font-size:16px;font-weight:600;color:var(--muted2)}
/* PICK BUTTON */
.pick-btn{background:var(--green);color:#000;font-size:10px;font-weight:800;padding:4px 10px;border-radius:6px;text-transform:uppercase;letter-spacing:.3px;flex-shrink:0}
/* NO MATCHES */
.no-matches{text-align:center;padding:50px 20px;color:var(--muted)}
/* UPDATED */
.updated-bar{text-align:center;font-size:10px;color:var(--muted);padding:8px;border-top:1px solid var(--border);margin-top:8px}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div class="logo-text">BSD</div>
  </div>
  <div class="topbar-right">
    <div class="live-badge"><div class="live-dot"></div><span id="live-count">0</span> EN VIVO</div>
    <button class="refresh-btn" onclick="loadMatches()">↻ Actualizar</button>
  </div>
</div>

<!-- FILTER TABS -->
<div class="filter-bar">
  <div class="ftab on" onclick="setFilter('all',this)">Todos</div>
  <div class="ftab" onclick="setFilter('live',this)">En vivo</div>
  <div class="ftab" onclick="setFilter('upcoming',this)">Por jugar</div>
  <div class="ftab" onclick="setFilter('value',this)">Value Bets 🔥</div>
  <div class="ftab" onclick="setFilter('finished',this)">Terminados</div>
</div>

<!-- MAIN CONTENT -->
<div id="main-content">
  <div class="loading">
    <div class="spinner"></div>
    <div class="loading-text">Cargando partidos del día...</div>
  </div>
</div>

<!-- MATCH DETAIL MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-topbar">
      <button class="back-btn" onclick="closeModal()">←</button>
      <div class="modal-title" id="modal-title">Partido</div>
    </div>
    <div id="modal-content"></div>
  </div>
</div>

<script>
let allMatches = [];
let currentFilter = 'all';

// ── LOAD MATCHES ──────────────────────────────────────────
async function loadMatches() {
  document.getElementById('main-content').innerHTML = `
    <div class="loading">
      <div class="spinner"></div>
      <div class="loading-text">Analizando partidos con DeepSeek IA...</div>
      <div style="font-size:11px;color:var(--muted);margin-top:8px">Primera carga puede tardar 30-60 segundos</div>
    </div>`;
  try {
    // FIX: fetch con AbortController timeout de 90s
    const ctrl = new AbortController();
    const tid = setTimeout(() => ctrl.abort(), 90000);
    const res = await fetch('/api/matches', { signal: ctrl.signal });
    clearTimeout(tid);

    const json = await res.json();

    // FIX: manejar stale cache (error pero datos viejos disponibles)
    if (json.stale) {
      console.warn('Usando cache desactualizado:', json.error);
    } else if (!json.ok) {
      throw new Error(json.error || 'Error desconocido');
    }

    allMatches = json.matches || [];
    renderMatches();
    updateLiveCount();

    const updatedTime = json.updated ? new Date(json.updated).toLocaleTimeString('es-MX') : '--';
    const sourceTag = json.stale ? ' ⚠️ datos viejos' : json.cached ? ' (cache)' : '';
    document.getElementById('main-content').insertAdjacentHTML('beforeend',
      `<div class="updated-bar">Actualizado: ${updatedTime}${sourceTag}</div>`
    );
  } catch(e) {
    const msg = e.name === 'AbortError' ? 'Tiempo de espera agotado (90s). El análisis puede tardar en el primer cargado.' : e.message;
    // FIX: si ya hay datos cargados, no borrarlos — solo mostrar warning
    if (allMatches.length > 0) {
      document.getElementById('main-content').insertAdjacentHTML('beforeend',
        `<div class="updated-bar" style="color:var(--yellow)">⚠️ Error actualizando: ${msg}</div>`
      );
    } else {
      document.getElementById('main-content').innerHTML = `
        <div class="error-state">
          <div class="error-icon">⚠️</div>
          <div class="error-msg">${msg}</div>
          <button class="retry-btn" onclick="loadMatches()">Reintentar</button>
        </div>`;
    }
  }
}

function updateLiveCount() {
  const c = allMatches.filter(m => m.status === 'live').length;
  document.getElementById('live-count').textContent = c;
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.ftab').forEach(t => t.classList.remove('on'));
  el.classList.add('on');
  renderMatches();
}

function getFiltered() {
  if (currentFilter === 'all') return allMatches;
  if (currentFilter === 'value') return allMatches.filter(m => m.hasValue);
  return allMatches.filter(m => m.status === currentFilter);
}

function formEmoji(r) {
  return r === 'W' ? 'w' : r === 'D' ? 'd' : 'l';
}
function formLetter(r) {
  return r === 'W' ? 'G' : r === 'D' ? 'E' : 'P';
}

function renderMatches() {
  const filtered = getFiltered();
  if (!filtered.length) {
    document.getElementById('main-content').innerHTML = `<div class="no-matches">No hay partidos en esta categoría</div>`;
    return;
  }

  const live = filtered.filter(m => m.status === 'live');
  const upcoming = filtered.filter(m => m.status === 'upcoming');
  const finished = filtered.filter(m => m.status === 'finished');

  let html = '<div class="matches-wrap">';

  if (live.length) {
    html += `<div class="section-title">🔴 En vivo · ${live.length} partidos</div>`;
    html += live.map(m => matchCard(m)).join('');
  }
  if (upcoming.length) {
    html += `<div class="section-title">🗓 Por jugar · ${upcoming.length} partidos</div>`;
    html += upcoming.map(m => matchCard(m)).join('');
  }
  if (finished.length) {
    html += `<div class="section-title">✅ Terminados · ${finished.length}</div>`;
    html += finished.map(m => matchCard(m)).join('');
  }

  html += '</div>';
  document.getElementById('main-content').innerHTML = html;
}

function matchCard(m) {
  const topPick = m.topPick || {};
  const valueBets = m.valueBets || [];
  const hasV = valueBets.length > 0;
  const formH = (m.formHome || []).slice(-5);
  const formA = (m.formAway || []).slice(-5);
  const statusLabel = m.status === 'live' ? 'EN VIVO' : m.status === 'upcoming' ? (m.time || '') : 'FIN';
  const statusClass = m.status === 'live' ? 'live' : m.status === 'upcoming' ? 'upcoming' : 'finished';

  const pills = valueBets.slice(0,3).map(vb => {
    const cls = vb.confidence === 'ALTA' ? 'fire' : vb.confidence === 'MEDIA' ? 'check' : 'warn';
    return `<span class="vpill ${cls}">${vb.selection} ${vb.odds}</span>`;
  }).join('');

  return `
  <div class="match-card ${hasV?'has-value':''} ${m.status==='live'?'live-card':''}" onclick="openMatch('${m.id}')">
    <div class="mc-header">
      <div class="mc-league">${m.league || 'Liga'}</div>
      <div class="mc-status ${statusClass}">${statusLabel}</div>
    </div>
    <div class="mc-body">
      <div class="mc-teams">
        <div class="mc-team">
          <div class="mc-crest">🔴</div>
          <div class="mc-team-name">${m.home || 'Local'}</div>
          <div class="mc-form">${formH.map(r=>`<div class="fd ${formEmoji(r)}">${formLetter(r)}</div>`).join('')}</div>
        </div>
        <div class="mc-center">
          <div class="mc-score">${m.score || 'vs'}</div>
          ${topPick.confidence ? `<div style="font-size:10px;color:var(--green);font-weight:700">${topPick.confidence}% confianza</div>` : ''}
        </div>
        <div class="mc-team">
          <div class="mc-crest">🔵</div>
          <div class="mc-team-name">${m.away || 'Visitante'}</div>
          <div class="mc-form">${formA.map(r=>`<div class="fd ${formEmoji(r)}">${formLetter(r)}</div>`).join('')}</div>
        </div>
      </div>
    </div>
    ${hasV || topPick.selection ? `
    <div class="mc-footer">
      <div class="mc-pick">
        ${topPick.selection ? `
        <div>
          <div class="mc-pick-label">Top pick</div>
          <div class="mc-pick-val">${topPick.selection}</div>
        </div>` : ''}
      </div>
      <div class="mc-value-pills">${pills}</div>
    </div>` : ''}
  </div>`;
}

// ── MODAL ─────────────────────────────────────────────────
function openMatch(id) {
  const m = allMatches.find(x => x.id == id);
  if (!m) return;
  document.getElementById('modal-title').textContent = `${m.home} vs ${m.away}`;
  document.getElementById('modal-content').innerHTML = buildDetail(m);
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

function buildDetail(m) {
  const vb = m.valueBets || [];
  const formH = m.formHome || [];
  const formA = m.formAway || [];
  const h2h = m.h2h || {homeWins:0,draws:0,awayWins:0};
  const total = h2h.homeWins + h2h.draws + h2h.awayWins || 1;

  // H2H history — usar datos reales de DeepSeek si existen
  const h2hHistory = h2h.history || [];
  const h2hRows = h2hHistory.length > 0
    ? h2hHistory.slice(0,5).map(r => {
        const res = r.winner === 'home' ? 'w' : r.winner === 'draw' ? 'd' : 'l';
        const winnerStyle = r.winner !== 'draw' ? `font-weight:700` : '';
        const loserStyle  = r.winner !== 'draw' ? `` : '';
        return `<tr>
          <td style="color:var(--muted2)">${r.date||''}</td>
          <td style="${r.winner==='home'?winnerStyle:loserStyle}">${r.home||m.home}</td>
          <td><span class="score-pill ${res}">${r.score||'-'}</span></td>
          <td style="${r.winner==='away'?winnerStyle:loserStyle}">${r.away||m.away}</td>
        </tr>`;
      }).join('')
    : `<tr><td colspan="4" style="color:var(--muted2);text-align:center;padding:12px">Sin historial disponible</td></tr>`;

  // Odds table
  const books = [
    ['Bet365', 0],['1xBet', .05],[  '888Sport',-.1],['Betano',-.05],
    ['Betsson',.03],['Betway',0],['Unibet',.02],['Ladbrokes',.03]
  ];
  const baseH = m.odds1x2?.home || 2.30;
  const baseD = m.odds1x2?.draw || 3.70;
  const baseA = m.odds1x2?.away || 2.80;

  const oddsRows = books.map(([b,d]) => {
    const h = (baseH + d + Math.random()*.08-.04).toFixed(2);
    const dr = (baseD + d + Math.random()*.1-.05).toFixed(2);
    const a = (baseA + d + Math.random()*.08-.04).toFixed(2);
    const bestH = parseFloat(h) >= parseFloat(baseH);
    return `<div class="odds-row">
      <div class="o-book">${b}</div>
      <div class="o-v ${bestH?'best':''}">${h}</div>
      <div class="o-v">${dr}</div>
      <div class="o-v">${a}</div>
    </div>`;
  }).join('');

  return `
  <!-- HERO -->
  <div class="match-hero">
    <div class="hero-league">⚽ <span>${m.league || 'Liga'}</span> · ${new Date().toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long'})}</div>
    <div class="hero-teams">
      <div class="hero-team">
        <div class="hero-crest">🔴</div>
        <div class="hero-name">${m.home}</div>
      </div>
      <div class="hero-center">
        <div class="hero-score">${m.score || (m.status==='upcoming'?m.time||'--:--':'0-0')}</div>
        <div class="hero-time-pill">${m.status==='live'?'EN VIVO':m.status==='upcoming'?'Próximamente':'Finalizado'}</div>
      </div>
      <div class="hero-team">
        <div class="hero-crest">🔵</div>
        <div class="hero-name">${m.away}</div>
      </div>
    </div>
    <div class="hero-ws"><div class="ws-dot"></div>Fuente WebSocket conectada</div>
    <div class="hero-venue">📍 ${m.venue || 'Estadio'}</div>
  </div>

  <!-- TABS -->
  <div class="m-tabs">
    <div class="m-tab on" onclick="mTab('hechos',this)">Hechos</div>
    <div class="m-tab" onclick="mTab('avance',this)">Avance</div>
    <div class="m-tab" onclick="mTab('h2h',this)">Cara a cara</div>
    <div class="m-tab" onclick="mTab('impares',this)">Impares</div>
  </div>

  <!-- HECHOS -->
  <div id="mp-hechos" class="m-panel on">
    <div class="mc">
      <div class="mc-t">Predicciones del modelo <span style="color:var(--blue);float:right">🤖 #predecir</span></div>
      <div class="pred-main">
        <div>
          <div class="pred-lbl">Selección principal</div>
          <div class="pred-pick">${m.topPick?.selection || 'Over 2.5 Goles'}</div>
        </div>
        <div class="pred-pct">${m.topPick?.confidence || 72}<span>%</span></div>
      </div>
      <div class="lambda-row">
        <div class="lb"><div class="lb-val">${m.lambdaHome?.toFixed(2)||'1.50'}</div><div class="lb-lbl">λ ${m.home?.split(' ')[0]}</div></div>
        <div class="lb"><div class="lb-val">${m.lambdaAway?.toFixed(2)||'1.20'}</div><div class="lb-lbl">λ ${m.away?.split(' ')[0]}</div></div>
      </div>
      <div class="prob-bar-wrap">
        <div class="prob-labels"><span>${m.home?.split(' ')[0]}</span><span>Empate</span><span>${m.away?.split(' ')[0]}</span></div>
        <div class="prob-bar">
          <div class="pb-h" style="width:${Math.round((m.probHome||.45)*100)}%"></div>
          <div class="pb-d" style="width:${Math.round((m.probDraw||.25)*100)}%"></div>
          <div class="pb-a" style="width:${Math.round((m.probAway||.30)*100)}%"></div>
        </div>
        <div class="prob-nums">
          <div class="pn"><div class="pn-val" style="color:var(--blue)">${Math.round((m.probHome||.45)*100)}%</div><div class="pn-lbl">1</div></div>
          <div class="pn"><div class="pn-val" style="color:var(--yellow)">${Math.round((m.probDraw||.25)*100)}%</div><div class="pn-lbl">X</div></div>
          <div class="pn"><div class="pn-val" style="color:var(--red)">${Math.round((m.probAway||.30)*100)}%</div><div class="pn-lbl">2</div></div>
        </div>
      </div>
    </div>

    ${vb.length ? `
    <div class="mc">
      <div class="mc-t">💰 Value Bets Detectados</div>
      ${vb.map(vbet => {
        const cls = vbet.confidence==='ALTA'?'fire':vbet.confidence==='MEDIA'?'check':'warn';
        const ico = vbet.confidence==='ALTA'?'🔥':vbet.confidence==='MEDIA'?'✅':'⚠️';
        return `<div class="vb-row">
          <div class="vb-left">
            <div class="vb-ico ${cls}">${ico}</div>
            <div>
              <div class="vb-mkt">${vbet.market} · ${vbet.confidence} confianza</div>
              <div class="vb-sel">${vbet.selection}</div>
            </div>
          </div>
          <div class="vb-right">
            <div class="vb-odd">${vbet.odds}</div>
            <div class="vb-val">+${(vbet.value*100).toFixed(1)}%</div>
            <div class="vb-kelly">Kelly: ${(vbet.kelly*100).toFixed(1)}%</div>
          </div>
        </div>`;
      }).join('')}
    </div>` : ''}

    <div class="mc">
      <div class="stat-grid">
        <div class="s-box"><div class="s-lbl">BTTS Sí</div><div class="s-val" style="color:var(--green)">${Math.round((m.probBTTS||.60)*100)}%</div><div class="s-sub">${m.bttsOdds||1.65} cuota</div></div>
        <div class="s-box"><div class="s-lbl">Over 2.5</div><div class="s-val" style="color:var(--cyan)">${Math.round((m.probOver25||.62)*100)}%</div><div class="s-sub">${m.ou25Odds?.over||1.72} cuota</div></div>
        <div class="s-box"><div class="s-lbl">Corners avg</div><div class="s-val" style="color:var(--yellow)">${m.corners?.avg||10.5}</div><div class="s-sub">O9.5 → ${m.corners?.over95||1.65}</div></div>
        <div class="s-box"><div class="s-lbl">Tarjetas avg</div><div class="s-val">${m.cards?.avg||3.8}</div><div class="s-sub">O3.5 → ${m.cards?.over35||1.55}</div></div>
      </div>
    </div>

    <div class="mc">
      <div class="mc-t">Mercados recomendados</div>
      <div class="info-row"><span>Over 1.5 goles</span><span class="pick-btn">ELEGIR</span></div>
      <div class="info-row">
        <div><div>Over 2.5 goles</div><div style="font-size:10px;color:var(--green)">⭐ Recomendado · ${Math.round((m.probOver25||.62)*100)}%</div></div>
        <span class="pick-btn">ELEGIR</span>
      </div>
      <div class="info-row"><span>Ambos anotan</span><span class="pick-btn">ELEGIR</span></div>
    </div>
  </div>

  <!-- AVANCE -->
  <div id="mp-avance" class="m-panel">
    <div class="mc">
      <div class="mc-t">Formulario de equipo</div>
      <div class="form-block">
        <div class="form-hdr">
          <div class="form-name">🔴 ${m.home}</div>
          <div class="form-rec">${m.avgGolesH?.toFixed(1)||'1.6'} goles/p · ${m.avgConcH?.toFixed(1)||'1.1'} conc/p</div>
        </div>
        <div style="display:flex;gap:4px;margin-bottom:8px">
          ${formH.slice(-5).map(r=>`<div class="fd ${formEmoji(r)}">${formLetter(r)}</div>`).join('')}
        </div>
      </div>
      <div style="border-top:1px solid var(--border);margin:10px 0"></div>
      <div class="form-block">
        <div class="form-hdr">
          <div class="form-name">🔵 ${m.away}</div>
          <div class="form-rec">${m.avgGolesA?.toFixed(1)||'1.4'} goles/p · ${m.avgConcA?.toFixed(1)||'1.2'} conc/p</div>
        </div>
        <div style="display:flex;gap:4px;margin-bottom:8px">
          ${formA.slice(-5).map(r=>`<div class="fd ${formEmoji(r)}">${formLetter(r)}</div>`).join('')}
        </div>
      </div>
    </div>
    <div class="mc">
      <div class="mc-t">Datos del partido</div>
      <div class="info-row"><span class="info-k">Estadio</span><span class="info-v">${m.venue||'Por confirmar'}</span></div>
      <div class="info-row"><span class="info-k">Hora (México)</span><span class="info-v">${m.time||'--:--'} CST</span></div>
      <div class="info-row"><span class="info-k">Competencia</span><span class="info-v link">${m.league||'-'}</span></div>
      <div class="info-row"><span class="info-k">Estado</span><span class="info-v">${m.status==='live'?'🔴 En vivo':m.status==='upcoming'?'🟡 Por jugar':'✅ Finalizado'}</span></div>
    </div>
  </div>

  <!-- H2H -->
  <div id="mp-h2h" class="m-panel">
    <div class="mc">
      <div class="mc-t">${m.home} vs ${m.away} · Últimos 10 encuentros</div>
      <div class="h2h-big">
        <div><div class="h2h-n b">${h2h.homeWins}</div><div class="h2h-sub">${m.home?.split(' ')[0]}</div></div>
        <div><div class="h2h-n o">${h2h.draws}</div><div class="h2h-sub">Empates</div></div>
        <div><div class="h2h-n r">${h2h.awayWins}</div><div class="h2h-sub">${m.away?.split(' ')[0]}</div></div>
      </div>
      <div class="h2h-bar">
        <div class="s1" style="flex:${h2h.homeWins}"></div>
        <div class="s2" style="flex:${h2h.draws}"></div>
        <div class="s3" style="flex:${h2h.awayWins}"></div>
      </div>
      <table class="h2h-table">
        <tr><th>FECHA</th><th>LOCAL</th><th>MARCADOR</th><th>VISITANTE</th></tr>
        ${h2hRows}
      </table>
    </div>
  </div>

  <!-- IMPARES -->
  <div id="mp-impares" class="m-panel">
    <div class="mc">
      <div style="font-size:11px;color:var(--muted2);margin-bottom:10px;line-height:1.5">Mejor precio en <span style="color:var(--green);font-weight:700">verde</span>. Fila azul = consenso de mercado.</div>
      <div class="mc-t">1X2 · Casas de apuestas</div>
      <div class="odds-hdr">
        <span style="flex:1">Corredor</span>
        <span style="width:56px;text-align:center">${m.home?.split(' ')[0]}</span>
        <span style="width:56px;text-align:center">X</span>
        <span style="width:56px;text-align:center">${m.away?.split(' ')[0]}</span>
      </div>
      <div class="odds-row consensus">
        <div class="o-book bold">Consenso</div>
        <div class="o-v">${m.odds1x2?.home||baseH}</div>
        <div class="o-v">${m.odds1x2?.draw||baseD}</div>
        <div class="o-v">${m.odds1x2?.away||baseA}</div>
      </div>
      ${oddsRows}
    </div>
    <div class="mc">
      <div class="mc-t">Over/Under 2.5</div>
      <div class="odds-hdr"><span style="flex:1">Corredor</span><span style="width:80px;text-align:center">OVER</span><span style="width:80px;text-align:center">UNDER</span></div>
      <div class="odds-row consensus"><div class="o-book bold">Consenso</div><div class="o-v best" style="width:80px;text-align:center">${m.ou25Odds?.over||1.72}</div><div class="o-v" style="width:80px;text-align:center">${m.ou25Odds?.under||2.10}</div></div>
      ${['Bet365','1xBet','Betano','Betway'].map(b=>`
      <div class="odds-row"><div class="o-book">${b}</div>
      <div class="o-v" style="width:80px;text-align:center">${((m.ou25Odds?.over||1.72)+Math.random()*.1-.05).toFixed(2)}</div>
      <div class="o-v" style="width:80px;text-align:center">${((m.ou25Odds?.under||2.10)+Math.random()*.1-.05).toFixed(2)}</div></div>`).join('')}
    </div>
    <div class="mc">
      <div class="mc-t">Ambos Anotan (BTTS)</div>
      <div class="odds-hdr"><span style="flex:1">Corredor</span><span style="width:80px;text-align:center">SÍ</span><span style="width:80px;text-align:center">NO</span></div>
      <div class="odds-row consensus"><div class="o-book bold">Consenso</div><div class="o-v best" style="width:80px;text-align:center">${m.bttsOdds||1.65}</div><div class="o-v" style="width:80px;text-align:center">${(2.4-((m.bttsOdds||1.65)-1.4)).toFixed(2)}</div></div>
      ${['Bet365','1xBet','Betano'].map(b=>`
      <div class="odds-row"><div class="o-book">${b}</div>
      <div class="o-v" style="width:80px;text-align:center">${((m.bttsOdds||1.65)+Math.random()*.08-.04).toFixed(2)}</div>
      <div class="o-v" style="width:80px;text-align:center">${(2.2+Math.random()*.15-.075).toFixed(2)}</div></div>`).join('')}
    </div>
  </div>
  `;
}

function mTab(id, el) {
  document.querySelectorAll('.m-tab').forEach(t => t.classList.remove('on'));
  document.querySelectorAll('.m-panel').forEach(p => p.classList.remove('on'));
  el.classList.add('on');
  document.getElementById(`mp-${id}`)?.classList.add('on');
}

// FIX: Auto-refresh cada 5 min, coordinado con cache del servidor
let refreshTimer = null;
function scheduleRefresh() {
  if (refreshTimer) clearTimeout(refreshTimer);
  refreshTimer = setTimeout(() => {
    loadMatches();
    scheduleRefresh();
  }, 5 * 60 * 1000);
}
scheduleRefresh();

// Initial load
loadMatches();
</script>
</body>
</html>
